# Triggered by Nooks after merchant payment. Runs EAS build for Android + iOS with merchant branding.
name: Nooks-triggered build
on:
  workflow_dispatch:
    inputs:
      merchant_id:
        required: true
        type: string
      app_name:
        required: false
        type: string
        default: "Nooks App"
      app_icon_url:
        required: false
        type: string
        default: ""
      app_icon_bg_color:
        required: false
        type: string
        default: ""
      logo_url:
        required: false
        type: string
        default: ""
      primary_color:
        required: false
        type: string
        default: "#0D9488"
      accent_color:
        required: false
        type: string
        default: "#0D9488"
      background_color:
        required: false
        type: string
        default: "#f5f5f4"
      menu_card_color:
        required: false
        type: string
        default: "#f5f5f4"
      text_color:
        required: false
        type: string
        default: "#1f2937"
      tab_text_color:
        required: false
        type: string
        default: "#ffffff"
      ios_bundle_id:
        required: false
        type: string
        default: ""
      android_package_id:
        required: false
        type: string
        default: ""
      apple_pay_merchant_id:
        required: false
        type: string
        default: ""
      moyasar_publishable_key:
        required: false
        type: string
        default: ""
      launcher_icon_scale:
        description: "Logo size inside launcher icon (20-150), must match app_config.launcher_icon_scale"
        required: false
        type: string
        default: "70"
      use_test_builds:
        description: "Use preview (Android APK) + ios-simulator so no Apple/Google dev accounts needed. Default false (production) — the operator-driven trigger from /ops always sends this explicitly, but a manual workflow-dispatch from GitHub UI will now produce a real production build unless you flip this on."
        required: false
        type: boolean
        default: false
      app_store_apple_id:
        description: "App Store Connect numeric Apple ID (10 digits). Empty = skip auto-submit; build only."
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Require EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "::error::EXPO_TOKEN is not set. Do this:"
            echo "1. Get token: Open https://expo.dev → log in → Profile → Account settings → Access tokens → Create token (e.g. name 'GitHub Actions') → copy the token."
            echo "2. Set in GitHub: This repo → Settings → Secrets and variables → Actions → New repository secret → Name: EXPO_TOKEN, Value: (paste token) → Add secret."
            echo "Or from repo root: run  gh secret set EXPO_TOKEN  and paste the token when prompted."
            exit 1
          fi

      - name: Require build env secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          API_URL: ${{ secrets.API_URL }}
          NOOKS_API_BASE_URL: ${{ secrets.NOOKS_API_BASE_URL }}
        run: |
          missing=0
          [ -z "$SUPABASE_URL" ] && echo "::error::SUPABASE_URL is not set in GitHub repo secrets." && missing=1
          [ -z "$SUPABASE_ANON_KEY" ] && echo "::error::SUPABASE_ANON_KEY is not set in GitHub repo secrets." && missing=1
          [ -z "$API_URL" ] && echo "::error::API_URL is not set in GitHub repo secrets." && missing=1
          [ -z "$NOOKS_API_BASE_URL" ] && echo "::error::NOOKS_API_BASE_URL is not set in GitHub repo secrets." && missing=1
          if [ "$missing" -eq 1 ]; then
            echo "Set missing secrets in: Repo -> Settings -> Secrets and variables -> Actions"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Write .env for EAS
        run: |
          APP_ICON_FILE=./assets/images/icon.png
          RAW_ICON_FILE=./assets/images/splash-source.png
          SPLASH_IMAGE_FILE=./assets/images/splash-icon.png
          if [ -n "${{ github.event.inputs.app_icon_url }}" ]; then
            echo "Downloading launcher icon from URL..."
            if curl -L --fail "${{ github.event.inputs.app_icon_url }}" -o ./assets/images/merchant-app-icon.png; then
              APP_ICON_FILE=./assets/images/merchant-app-icon.png
            else
              echo "::warning::Failed to download app icon URL. Using default icon."
            fi
          fi
          if [ "$APP_ICON_FILE" != "$RAW_ICON_FILE" ]; then
            cp "$APP_ICON_FILE" "$RAW_ICON_FILE"
          fi
          # Composite icon with background color for iOS (iOS uses the raw icon, no adaptive bg).
          # Logo size matches dashboard "Launcher icon size" (launcher_icon_scale % of canvas).
          BG_COLOR="${{ github.event.inputs.app_icon_bg_color }}"
          SPLASH_TILE_BG="$BG_COLOR"
          if [ -z "$SPLASH_TILE_BG" ] || [ "$SPLASH_TILE_BG" = "none" ] || [ "$SPLASH_TILE_BG" = "null" ]; then
            SPLASH_TILE_BG="${{ github.event.inputs.primary_color }}"
          fi
          if [ -z "$SPLASH_TILE_BG" ] || [ "$SPLASH_TILE_BG" = "none" ] || [ "$SPLASH_TILE_BG" = "null" ]; then
            SPLASH_TILE_BG="#0D9488"
          fi
          RAW_SCALE="${{ github.event.inputs.launcher_icon_scale }}"
          if [ -z "$RAW_SCALE" ] || [ "$RAW_SCALE" = "null" ]; then RAW_SCALE=70; fi
          if ! [[ "$RAW_SCALE" =~ ^[0-9]+$ ]]; then RAW_SCALE=70; fi
          if [ "$RAW_SCALE" -lt 20 ]; then RAW_SCALE=20; fi
          if [ "$RAW_SCALE" -gt 150 ]; then RAW_SCALE=150; fi
          MOYASAR_PUBLISHABLE_KEY_VALUE="${{ github.event.inputs.moyasar_publishable_key }}"
          APPLE_PAY_MERCHANT_ID_VALUE="${{ github.event.inputs.apple_pay_merchant_id }}"
          IOS_BUNDLE_ID_VALUE="${{ github.event.inputs.ios_bundle_id }}"
          ANDROID_PACKAGE_ID_VALUE="${{ github.event.inputs.android_package_id }}"
          echo "Using launcher_icon_scale=${RAW_SCALE}%"
          npm install --no-save sharp 2>/dev/null || true
          if [ -n "$BG_COLOR" ] && [ "$BG_COLOR" != "none" ] && [ "$BG_COLOR" != "null" ]; then
            echo "Compositing icon with background color $BG_COLOR for iOS..."
            node -e "
              const sharp = require('sharp');
              const scalePct = ${RAW_SCALE};
              const K = 'lanczos3';
              (async () => {
                const iconPath = '$APP_ICON_FILE';
                const bgColor = '$BG_COLOR';
                const icon = sharp(iconPath, { pages: 1 });
                const meta = await icon.metadata();
                const srcW = meta.width || 1024;
                const srcH = meta.height || 1024;
                const srcMax = Math.max(srcW, srcH);
                const size = Math.min(4096, Math.max(1024, srcMax));
                const inner = Math.max(8, Math.min(size, Math.round(size * (scalePct / 100))));
                const SS = 2;
                const canvasPx = size * SS;
                const innerPx = inner * SS;
                const iconBuf = await icon
                  .ensureAlpha()
                  .resize(innerPx, innerPx, { fit: 'contain', background: { r: 0, g: 0, b: 0, alpha: 0 }, kernel: K })
                  .png({ compressionLevel: 6, effort: 10 })
                  .toBuffer();
                const iconMeta = await sharp(iconBuf).metadata();
                const topPad = Math.max(0, Math.floor((canvasPx - innerPx) / 2));
                const leftPad = Math.max(0, Math.floor((canvasPx - innerPx) / 2));
                const bottomPad = Math.max(0, canvasPx - innerPx - topPad);
                const rightPad = Math.max(0, canvasPx - innerPx - leftPad);
                console.log('Icon overlay size:', iconMeta.width, 'x', iconMeta.height, 'canvas:', canvasPx, 'x', canvasPx, 'pad:', leftPad, topPad, rightPad, bottomPad);
                await sharp(iconBuf)
                  .extend({
                    top: topPad,
                    bottom: bottomPad,
                    left: leftPad,
                    right: rightPad,
                    background: { r: 0, g: 0, b: 0, alpha: 0 },
                  })
                  .flatten({ background: bgColor })
                  .resize(size, size, { kernel: K, fit: 'fill' })
                  .png({ compressionLevel: 6, effort: 10 })
                  .toFile(iconPath);
                console.log('Icon composited (2x supersample + lanczos3):', bgColor, 'scale:', scalePct + '%', 'out:', size, 'inner:', inner);
              })().catch(e => { console.error(e); process.exit(1); });
            "
          fi
          echo "Generating branded splash artwork..."
          APP_ICON_SCALE="$RAW_SCALE" RAW_ICON_FILE_PATH="$RAW_ICON_FILE" SPLASH_IMAGE_PATH="$SPLASH_IMAGE_FILE" SPLASH_TILE_BG="$SPLASH_TILE_BG" node <<'EOF'
          const sharp = require('sharp');

          const rawIconPath = process.env.RAW_ICON_FILE_PATH;
          const outPath = process.env.SPLASH_IMAGE_PATH;
          const tileBg = process.env.SPLASH_TILE_BG || '#0D9488';
          const rawScale = Number(process.env.APP_ICON_SCALE || '70');
          const scalePct = Math.min(150, Math.max(20, Number.isFinite(rawScale) ? rawScale : 70));

          const canvasW = 360;
          const canvasH = 560;
          const tileSize = 220;
          const tileRadius = 56;
          const tileLeft = Math.round((canvasW - tileSize) / 2);
          const tileTop = 132;
          const tileBottom = tileTop + tileSize;
          const centerX = Math.round(canvasW / 2);
          const dotY = tileBottom + 92;
          const dotRadius = 6;
          const dotGap = 16;
          const logoSize = Math.round(tileSize * Math.min(0.72, Math.max(0.42, scalePct / 100)));

          const shadowSvg = Buffer.from(`
            <svg width="${canvasW}" height="${canvasH}" viewBox="0 0 ${canvasW} ${canvasH}" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur in="SourceGraphic" stdDeviation="22" />
                </filter>
              </defs>
              <circle cx="${centerX}" cy="${tileTop + Math.round(tileSize / 2)}" r="${Math.round(tileSize * 0.62)}" fill="${tileBg}" fill-opacity="0.10" filter="url(#shadow)" />
              <rect x="${tileLeft}" y="${tileTop + 18}" width="${tileSize}" height="${tileSize}" rx="${tileRadius}" fill="#000000" fill-opacity="0.16" filter="url(#shadow)" />
              <circle cx="${centerX - dotGap}" cy="${dotY}" r="${dotRadius}" fill="${tileBg}" fill-opacity="0.32" />
              <circle cx="${centerX}" cy="${dotY}" r="${dotRadius}" fill="${tileBg}" fill-opacity="0.52" />
              <circle cx="${centerX + dotGap}" cy="${dotY}" r="${dotRadius}" fill="${tileBg}" fill-opacity="0.96" />
            </svg>
          `);

          const tileSvg = Buffer.from(`
            <svg width="${tileSize}" height="${tileSize}" viewBox="0 0 ${tileSize} ${tileSize}" xmlns="http://www.w3.org/2000/svg">
              <rect width="${tileSize}" height="${tileSize}" rx="${tileRadius}" fill="${tileBg}" />
            </svg>
          `);

          (async () => {
            const logoBuf = await sharp(rawIconPath, { pages: 1 })
              .ensureAlpha()
              .resize(logoSize, logoSize, {
                fit: 'contain',
                background: { r: 0, g: 0, b: 0, alpha: 0 },
                kernel: 'lanczos3',
              })
              .png({ compressionLevel: 6, effort: 10 })
              .toBuffer();

            const tileBuf = await sharp(tileSvg)
              .composite([{ input: logoBuf, gravity: 'center' }])
              .png({ compressionLevel: 6, effort: 10 })
              .toBuffer();

            await sharp({
              create: {
                width: canvasW,
                height: canvasH,
                channels: 4,
                background: { r: 0, g: 0, b: 0, alpha: 0 },
              },
            })
              .composite([
                { input: shadowSvg, left: 0, top: 0 },
                { input: tileBuf, left: tileLeft, top: tileTop },
              ])
              .png({ compressionLevel: 6, effort: 10 })
              .toFile(outPath);

            console.log('Splash card generated:', outPath, 'tileBg:', tileBg, 'logoScale:', scalePct + '%');
          })().catch((e) => {
            console.error(e);
            process.exit(1);
          });
          EOF
          # Keep launcher/icon assets aligned with the merchant icon while using a dedicated splash card artwork.
          for target in android-icon-foreground.png android-icon-monochrome.png icon.png; do
            dest="./assets/images/$target"
            if [ "$(realpath "$APP_ICON_FILE")" != "$(realpath "$dest")" ]; then
              cp "$APP_ICON_FILE" "$dest"
            fi
          done
          echo "EXPO_PUBLIC_MERCHANT_ID=${{ github.event.inputs.merchant_id }}" > .env
          echo "EXPO_PUBLIC_APP_NAME=${{ github.event.inputs.app_name }}" >> .env
          echo "EXPO_PUBLIC_APP_ICON_FILE=$APP_ICON_FILE" >> .env
          echo "EXPO_PUBLIC_SPLASH_IMAGE_FILE=$SPLASH_IMAGE_FILE" >> .env
          echo "EXPO_PUBLIC_LOGO_URL=${{ github.event.inputs.logo_url }}" >> .env
          echo "EXPO_PUBLIC_PRIMARY_COLOR=${{ github.event.inputs.primary_color }}" >> .env
          echo "EXPO_PUBLIC_ACCENT_COLOR=${{ github.event.inputs.accent_color }}" >> .env
          echo "EXPO_PUBLIC_BACKGROUND_COLOR=${{ github.event.inputs.background_color }}" >> .env
          echo "EXPO_PUBLIC_MENU_CARD_COLOR=${{ github.event.inputs.menu_card_color }}" >> .env
          echo "EXPO_PUBLIC_TEXT_COLOR=${{ github.event.inputs.text_color }}" >> .env
          echo "EXPO_PUBLIC_TAB_TEXT_COLOR=${{ github.event.inputs.tab_text_color }}" >> .env
          echo "EXPO_PUBLIC_APP_ICON_BG_COLOR=${{ github.event.inputs.app_icon_bg_color }}" >> .env
          echo "EXPO_PUBLIC_LAUNCHER_ICON_SCALE=${{ github.event.inputs.launcher_icon_scale }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_API_URL=${{ secrets.API_URL }}" >> .env
          echo "EXPO_PUBLIC_NOOKS_API_BASE_URL=${{ secrets.NOOKS_API_BASE_URL }}" >> .env
          echo "EXPO_PUBLIC_MOYASAR_PUBLISHABLE_KEY=$MOYASAR_PUBLISHABLE_KEY_VALUE" >> .env
          echo "EXPO_PUBLIC_APPLE_PAY_MERCHANT_ID=$APPLE_PAY_MERCHANT_ID_VALUE" >> .env
          echo "EXPO_PUBLIC_IOS_BUNDLE_IDENTIFIER=$IOS_BUNDLE_ID_VALUE" >> .env
          echo "EXPO_PUBLIC_ANDROID_PACKAGE=$ANDROID_PACKAGE_ID_VALUE" >> .env
          if [ -n "${{ secrets.GOOGLE_MAPS_API_KEY }}" ]; then
            echo "GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" >> .env
          else
            echo "GOOGLE_MAPS_API_KEY=" >> .env
            echo "::warning::GOOGLE_MAPS_API_KEY is not set. Android maps will run in fallback mode."
          fi
          echo "--- .env written ---"
          wc -l .env
          grep "PRIMARY_COLOR" .env

      - name: Build Android
        run: |
          if [ "${{ github.event.inputs.use_test_builds }}" = "true" ]; then
            eas build --platform android --profile preview --non-interactive --no-wait
          else
            eas build --platform android --non-interactive --no-wait
          fi

      - name: Verify iOS credential secrets are set
        # Diagnostic for the local-credential build path. Production iOS
        # builds need:
        #   - ASC_API_KEY_ID / ISSUER_ID / P8_BASE64 — Admin-role API key
        #     that mints a fresh provisioning profile per merchant via
        #     Apple's API and uploads the IPA to TestFlight at the end.
        #   - IOS_DIST_CERT_P12_BASE64 / _PASSWORD — the team's Distribution
        #     Certificate as a .p12. Shared across every merchant; only the
        #     provisioning profile is per-merchant.
        if: github.event.inputs.use_test_builds != 'true'
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_P12_PASSWORD: ${{ secrets.IOS_DIST_CERT_P12_PASSWORD }}
        run: |
          status() {
            if [ -n "$2" ]; then
              echo "  ✓ $1 (length=${#2})"
            else
              echo "  ✗ $1 — MISSING"
              missing=1
            fi
          }
          missing=0
          echo "iOS credential secrets:"
          status "ASC_API_KEY_ID" "$ASC_API_KEY_ID"
          status "ASC_API_ISSUER_ID" "$ASC_API_ISSUER_ID"
          status "ASC_API_KEY_P8_BASE64" "$ASC_API_KEY_P8_BASE64"
          status "IOS_DIST_CERT_P12_BASE64" "$IOS_DIST_CERT_P12_BASE64"
          status "IOS_DIST_CERT_P12_PASSWORD" "$IOS_DIST_CERT_P12_PASSWORD"
          if [ "$missing" -eq 1 ]; then
            echo "::error::iOS credential secrets missing. Set them under: Repo → Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Prepare iOS App Store Connect API key
        # Decode the .p8 once for any production build. Both the Build
        # step (which uses it as Apple Developer Portal auth so EAS can
        # auto-create cert/profile for a new merchant's bundle) and the
        # Submit step (which uploads the .ipa) need the same file. Skipped
        # on test builds since the preview profile never talks to Apple.
        if: github.event.inputs.use_test_builds != 'true'
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: |
          : "${ASC_API_KEY_ID:?ASC_API_KEY_ID secret missing on the repo}"
          : "${ASC_API_KEY_P8_BASE64:?ASC_API_KEY_P8_BASE64 secret missing}"
          mkdir -p .nooks-build
          printf '%s' "$ASC_API_KEY_P8_BASE64" | base64 -d > ".nooks-build/AuthKey_${ASC_API_KEY_ID}.p8"
          chmod 600 ".nooks-build/AuthKey_${ASC_API_KEY_ID}.p8"
          ls -la .nooks-build/

      - name: Setup iOS local credentials
        # Local-credential path for multi-merchant production builds. Decodes
        # the team-wide Distribution Certificate (.p12 from secret) and calls
        # Apple's App Store Connect API to mint a fresh provisioning profile
        # for THIS merchant's bundle id. Writes credentials.json so EAS Build
        # signs the IPA with these files instead of fetching from EAS Servers
        # and re-validating against Apple — that validation is the step that
        # fails non-interactively in CI.
        if: github.event.inputs.use_test_builds != 'true'
        env:
          BUNDLE_ID: ${{ github.event.inputs.ios_bundle_id }}
          P12_PASSWORD: ${{ secrets.IOS_DIST_CERT_P12_PASSWORD }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_PATH: ./.nooks-build/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
        run: |
          : "${BUNDLE_ID:?ios_bundle_id input is empty — every merchant needs a registered Apple bundle id}"
          mkdir -p .nooks-build/ios

          # Decode the .p12 secret. -i (ignore-garbage) tolerates stray
          # whitespace, line-wraps, or other non-base64 chars that can sneak
          # in when the secret is pasted into GitHub's textarea. Without it,
          # GNU base64 fails the whole step with "invalid input".
          P12_LEN=${#IOS_DIST_CERT_P12_BASE64}
          echo "IOS_DIST_CERT_P12_BASE64 length: $P12_LEN chars"
          if ! printf '%s' "$IOS_DIST_CERT_P12_BASE64" | base64 -di > .nooks-build/ios/dist-cert.p12 2>/tmp/b64.err; then
            echo "::error::base64 decode failed:"
            cat /tmp/b64.err
            echo "::error::Re-paste the IOS_DIST_CERT_P12_BASE64 secret as one continuous string (no line breaks)."
            exit 1
          fi
          P12_BYTES=$(wc -c < .nooks-build/ios/dist-cert.p12)
          echo ".p12 file: $P12_BYTES bytes"
          chmod 600 .nooks-build/ios/dist-cert.p12

          # Verify .p12 opens with the password. Catches paste corruption AND
          # password mismatch BEFORE we burn 25 minutes of EAS Build time.
          if ! openssl pkcs12 -in .nooks-build/ios/dist-cert.p12 -passin pass:"$P12_PASSWORD" -nokeys -clcerts -out /tmp/cert-check.pem 2>/tmp/p12.err; then
            echo "::error::.p12 could not be opened with IOS_DIST_CERT_P12_PASSWORD:"
            cat /tmp/p12.err
            echo "::error::Either the .p12 base64 was corrupted on paste, or the password secret is wrong. Re-run scripts/setup-ios-distribution-cert.mjs locally and set both secrets again."
            exit 1
          fi
          rm -f /tmp/cert-check.pem
          echo "✓ .p12 opens with password — credentials look good"

          node scripts/provision-ios-build.mjs
          echo "--- iOS credentials prepared ---"
          ls -la .nooks-build/ios/
          ls -la credentials.json

      - name: Build iOS
        # With credentialsSource: "local" in eas.json's production iOS
        # profile, EAS Build reads ./credentials.json and signs locally with
        # the .p12 + .mobileprovision written by the Setup step above. No
        # Apple Developer Portal validation, so no Apple auth env vars
        # needed for non-interactive CI.
        run: |
          if [ "${{ github.event.inputs.use_test_builds }}" = "true" ]; then
            eas build --platform ios --profile preview --non-interactive --no-wait
          else
            eas build --platform ios --non-interactive
          fi

      - name: Submit iOS to TestFlight
        # Skip when:
        #   - we did a test build (preview profile — internal distribution
        #     archive, not signed for App Store);
        #   - the merchant doesn't have an App Store Connect Apple ID set
        #     yet (operator hasn't created the App Store record);
        #   - any of the ASC API key secrets are missing on this repo.
        if: |
          github.event.inputs.use_test_builds != 'true' &&
          github.event.inputs.app_store_apple_id != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          ASC_APP_ID: ${{ github.event.inputs.app_store_apple_id }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          # The .p8 was already decoded by the "Prepare iOS App Store
          # Connect API key" step at the top of the iOS path. Both Build
          # and Submit reuse the same file — Cleanup at the bottom wipes
          # it regardless of success/failure.
          : "${APPLE_ID:?APPLE_ID secret missing on the repo}"
          : "${ASC_API_KEY_ID:?ASC_API_KEY_ID secret missing}"
          : "${ASC_API_ISSUER_ID:?ASC_API_ISSUER_ID secret missing}"

          KEY_FILE=".nooks-build/AuthKey_${ASC_API_KEY_ID}.p8"
          if [ ! -f "$KEY_FILE" ]; then
            echo "::error::Expected .p8 at $KEY_FILE — Prepare step didn't run or was skipped."
            exit 1
          fi

          # Patch eas.json with the per-merchant submit profile. Done at
          # workflow time (not committed) because:
          #  - ascAppId is per-merchant
          #  - the .p8 path only exists on this runner
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('eas.json', 'utf8'));
            cfg.submit = cfg.submit || {};
            cfg.submit.production = cfg.submit.production || {};
            cfg.submit.production.ios = {
              appleId: process.env.APPLE_ID,
              ascAppId: process.env.ASC_APP_ID,
              ascApiKeyPath: './.nooks-build/AuthKey_' + process.env.ASC_API_KEY_ID + '.p8',
              ascApiKeyId: process.env.ASC_API_KEY_ID,
              ascApiKeyIssuerId: process.env.ASC_API_ISSUER_ID,
            };
            fs.writeFileSync('eas.json', JSON.stringify(cfg, null, 2));
          "

          eas submit --platform ios --latest --profile production --non-interactive

      - name: Cleanup iOS credentials
        if: always()
        run: |
          # Always wipe credential files even if a step failed — the .p12,
          # provisioning profile, .p8 ASC key, and credentials.json all
          # contain Apple-team-wide signing material that should never
          # persist beyond this single workflow run.
          rm -rf .nooks-build || true
          rm -f credentials.json || true
