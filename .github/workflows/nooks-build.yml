# Triggered by Nooks after merchant payment. Runs EAS build for Android + iOS with merchant branding.
name: Nooks-triggered build
on:
  workflow_dispatch:
    inputs:
      merchant_id:
        required: true
        type: string
      app_name:
        required: false
        type: string
        default: "Nooks App"
      app_icon_url:
        required: false
        type: string
        default: ""
      app_icon_bg_color:
        required: false
        type: string
        default: ""
      logo_url:
        required: false
        type: string
        default: ""
      primary_color:
        required: false
        type: string
        default: "#0D9488"
      accent_color:
        required: false
        type: string
        default: "#0D9488"
      background_color:
        required: false
        type: string
        default: "#f5f5f4"
      menu_card_color:
        required: false
        type: string
        default: "#f5f5f4"
      text_color:
        required: false
        type: string
        default: "#1f2937"
      tab_text_color:
        required: false
        type: string
        default: "#ffffff"
      launcher_icon_scale:
        description: "Logo size inside launcher icon (20-150), must match app_config.launcher_icon_scale"
        required: false
        type: string
        default: "70"
      use_test_builds:
        description: "Use preview (Android APK) + ios-simulator so no Apple/Google dev accounts needed"
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Require EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "::error::EXPO_TOKEN is not set. Do this:"
            echo "1. Get token: Open https://expo.dev → log in → Profile → Account settings → Access tokens → Create token (e.g. name 'GitHub Actions') → copy the token."
            echo "2. Set in GitHub: This repo → Settings → Secrets and variables → Actions → New repository secret → Name: EXPO_TOKEN, Value: (paste token) → Add secret."
            echo "Or from repo root: run  gh secret set EXPO_TOKEN  and paste the token when prompted."
            exit 1
          fi

      - name: Require build env secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          API_URL: ${{ secrets.API_URL }}
          NOOKS_API_BASE_URL: ${{ secrets.NOOKS_API_BASE_URL }}
          MOYASAR_PUBLISHABLE_KEY: ${{ secrets.MOYASAR_PUBLISHABLE_KEY }}
        run: |
          missing=0
          [ -z "$SUPABASE_URL" ] && echo "::error::SUPABASE_URL is not set in GitHub repo secrets." && missing=1
          [ -z "$SUPABASE_ANON_KEY" ] && echo "::error::SUPABASE_ANON_KEY is not set in GitHub repo secrets." && missing=1
          [ -z "$API_URL" ] && echo "::error::API_URL is not set in GitHub repo secrets." && missing=1
          [ -z "$NOOKS_API_BASE_URL" ] && echo "::error::NOOKS_API_BASE_URL is not set in GitHub repo secrets." && missing=1
          [ -z "$MOYASAR_PUBLISHABLE_KEY" ] && echo "::error::MOYASAR_PUBLISHABLE_KEY is not set in GitHub repo secrets." && missing=1
          if [ "$missing" -eq 1 ]; then
            echo "Set missing secrets in: Repo -> Settings -> Secrets and variables -> Actions"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Write .env for EAS
        run: |
          APP_ICON_FILE=./assets/images/icon.png
          if [ -n "${{ github.event.inputs.app_icon_url }}" ]; then
            echo "Downloading launcher icon from URL..."
            if curl -L --fail "${{ github.event.inputs.app_icon_url }}" -o ./assets/images/merchant-app-icon.png; then
              APP_ICON_FILE=./assets/images/merchant-app-icon.png
            else
              echo "::warning::Failed to download app icon URL. Using default icon."
            fi
          fi
          # Composite icon with background color for iOS (iOS uses the raw icon, no adaptive bg).
          # Logo size matches dashboard "Launcher icon size" (launcher_icon_scale % of canvas).
          BG_COLOR="${{ github.event.inputs.app_icon_bg_color }}"
          RAW_SCALE="${{ github.event.inputs.launcher_icon_scale }}"
          if [ -z "$RAW_SCALE" ] || [ "$RAW_SCALE" = "null" ]; then RAW_SCALE=70; fi
          if ! [[ "$RAW_SCALE" =~ ^[0-9]+$ ]]; then RAW_SCALE=70; fi
          if [ "$RAW_SCALE" -lt 20 ]; then RAW_SCALE=20; fi
          if [ "$RAW_SCALE" -gt 150 ]; then RAW_SCALE=150; fi
          echo "Using launcher_icon_scale=${RAW_SCALE}%"
          if [ -n "$BG_COLOR" ] && [ "$BG_COLOR" != "none" ] && [ "$BG_COLOR" != "null" ]; then
            echo "Compositing icon with background color $BG_COLOR for iOS..."
            npm install --no-save sharp 2>/dev/null || true
            node -e "
              const sharp = require('sharp');
              const scalePct = ${RAW_SCALE};
              const K = 'lanczos3';
              (async () => {
                const iconPath = '$APP_ICON_FILE';
                const bgColor = '$BG_COLOR';
                const icon = sharp(iconPath, { pages: 1 });
                const meta = await icon.metadata();
                const srcW = meta.width || 1024;
                const srcH = meta.height || 1024;
                const srcMax = Math.max(srcW, srcH);
                const size = Math.min(4096, Math.max(1024, srcMax));
                const inner = Math.max(8, Math.min(size, Math.round(size * (scalePct / 100))));
                const SS = 2;
                const canvasPx = size * SS;
                const innerPx = inner * SS;
                const iconBuf = await icon
                  .ensureAlpha()
                  .resize(innerPx, innerPx, { fit: 'contain', background: { r: 0, g: 0, b: 0, alpha: 0 }, kernel: K })
                  .png({ compressionLevel: 6, effort: 10 })
                  .toBuffer();
                const iconMeta = await sharp(iconBuf).metadata();
                const topPad = Math.max(0, Math.floor((canvasPx - innerPx) / 2));
                const leftPad = Math.max(0, Math.floor((canvasPx - innerPx) / 2));
                const bottomPad = Math.max(0, canvasPx - innerPx - topPad);
                const rightPad = Math.max(0, canvasPx - innerPx - leftPad);
                console.log('Icon overlay size:', iconMeta.width, 'x', iconMeta.height, 'canvas:', canvasPx, 'x', canvasPx, 'pad:', leftPad, topPad, rightPad, bottomPad);
                await sharp(iconBuf)
                  .extend({
                    top: topPad,
                    bottom: bottomPad,
                    left: leftPad,
                    right: rightPad,
                    background: { r: 0, g: 0, b: 0, alpha: 0 },
                  })
                  .flatten({ background: bgColor })
                  .resize(size, size, { kernel: K, fit: 'fill' })
                  .png({ compressionLevel: 6, effort: 10 })
                  .toFile(iconPath);
                console.log('Icon composited (2x supersample + lanczos3):', bgColor, 'scale:', scalePct + '%', 'out:', size, 'inner:', inner);
              })().catch(e => { console.error(e); process.exit(1); });
            "
          fi
          # Keep all startup/icon assets aligned with merchant icon to avoid cached red placeholder flash.
          for target in splash-icon.png android-icon-foreground.png android-icon-monochrome.png icon.png; do
            dest="./assets/images/$target"
            if [ "$(realpath "$APP_ICON_FILE")" != "$(realpath "$dest")" ]; then
              cp "$APP_ICON_FILE" "$dest"
            fi
          done
          echo "EXPO_PUBLIC_MERCHANT_ID=${{ github.event.inputs.merchant_id }}" > .env
          echo "EXPO_PUBLIC_APP_NAME=${{ github.event.inputs.app_name }}" >> .env
          echo "EXPO_PUBLIC_APP_ICON_FILE=$APP_ICON_FILE" >> .env
          echo "EXPO_PUBLIC_LOGO_URL=${{ github.event.inputs.logo_url }}" >> .env
          echo "EXPO_PUBLIC_PRIMARY_COLOR=${{ github.event.inputs.primary_color }}" >> .env
          echo "EXPO_PUBLIC_ACCENT_COLOR=${{ github.event.inputs.accent_color }}" >> .env
          echo "EXPO_PUBLIC_BACKGROUND_COLOR=${{ github.event.inputs.background_color }}" >> .env
          echo "EXPO_PUBLIC_MENU_CARD_COLOR=${{ github.event.inputs.menu_card_color }}" >> .env
          echo "EXPO_PUBLIC_TEXT_COLOR=${{ github.event.inputs.text_color }}" >> .env
          echo "EXPO_PUBLIC_TAB_TEXT_COLOR=${{ github.event.inputs.tab_text_color }}" >> .env
          echo "EXPO_PUBLIC_APP_ICON_BG_COLOR=${{ github.event.inputs.app_icon_bg_color }}" >> .env
          echo "EXPO_PUBLIC_LAUNCHER_ICON_SCALE=${{ github.event.inputs.launcher_icon_scale }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_API_URL=${{ secrets.API_URL }}" >> .env
          echo "EXPO_PUBLIC_NOOKS_API_BASE_URL=${{ secrets.NOOKS_API_BASE_URL }}" >> .env
          echo "EXPO_PUBLIC_MOYASAR_PUBLISHABLE_KEY=${{ secrets.MOYASAR_PUBLISHABLE_KEY }}" >> .env
          echo "EXPO_PUBLIC_APPLE_PAY_MERCHANT_ID=${{ secrets.APPLE_PAY_MERCHANT_ID }}" >> .env
          if [ -n "${{ secrets.GOOGLE_MAPS_API_KEY }}" ]; then
            echo "GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" >> .env
          else
            echo "GOOGLE_MAPS_API_KEY=" >> .env
            echo "::warning::GOOGLE_MAPS_API_KEY is not set. Android maps will run in fallback mode."
          fi
          echo "--- .env written ---"
          wc -l .env
          grep "PRIMARY_COLOR" .env

      - name: Build Android
        run: |
          if [ "${{ github.event.inputs.use_test_builds }}" = "true" ]; then
            eas build --platform android --profile preview --non-interactive --no-wait
          else
            eas build --platform android --non-interactive --no-wait
          fi

      - name: Build iOS
        run: |
          if [ "${{ github.event.inputs.use_test_builds }}" = "true" ]; then
            eas build --platform ios --profile preview --non-interactive --no-wait
          else
            eas build --platform ios --non-interactive --no-wait
          fi
